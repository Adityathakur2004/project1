services:
  postgres:
    image: postgres:16-alpine
    container_name: edupilot-postgres
    environment:
      POSTGRES_DB: edupilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - edupilot_pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edupilot-app
    depends_on:
      - postgres
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/edupilot
      PGSSL: disable
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "4000:4000"
    command: sh -c "node db/migrate.js && node db/seed.js && node server.js"

volumes:
  edupilot_pgdata:
